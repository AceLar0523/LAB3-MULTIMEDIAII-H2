<main class="main-container">
  <div *ngIf="router.url !== '/avatar'" class="content-card">
    <header class="header">
      <h1>{{ labName() }}</h1>
      <p class="subtitle">Desarrollo de Aplicaciones Web</p>
    </header>

    <section class="user-info">
      <div class="avatar-placeholder">
        <span class="user-icon">👤</span>
      </div>
      <h2>{{ studentName() }}</h2>
      <p>Estudiante de Ingeniería</p>
    </section>

    <footer class="actions">
      <button routerLink="/avatar" class="btn-primary">
        Ver mi Perfil de Avatar
      </button>
    </footer>
  </div>

  <router-outlet />
</main>
